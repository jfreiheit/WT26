<div class="container">
<input class="form-control my-3" type="text" [formControl]="search" (input)="filter()"/>

@if(filterMembers().length == 0) {
  <h3>Keine Einträge vorhanden</h3>
}
@else {
  <h3>Alle Teilnehmerinnen</h3>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nr</th>
        <th>Vorname</th>
        <th>Nachname</th>
        <th>E-Mail</th>
      </tr>
    </thead>
    <tbody>
      @for(member of filterMembers(); track $index) {
        <tr>
          <td>{{$index + 1}}</td>
          <td>{{ member.forename }} </td>
          <td>{{ member.surname }} </td>
          <td>{{ member.email }} </td>
        </tr>
      }
    </tbody>
  </table>
}
</div>
