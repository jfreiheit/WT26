<div class="container">

      
  <input class="mt-5 form-control" [formControl]="search" (input)="filter()" />

  @if(filteredMembers().length == 0)
  {
    <h3 class="my-3">Keine Einträge vorhanden!</h3>
  }
  @else 
  {
    <h3 class="my-3">Alle Teilnehmerinnen</h3>

    <table class="table table-striped">

      <thead>
        <tr>
          <th>Nr.</th>
          <th>Vorname</th>
          <th>Nachname</th>
          <th>E-Mail</th>
        </tr>
      </thead>
      <tbody>
        @for(member of filteredMembers(); track $index) 
        {
            <tr>
              <td>{{$index + 1}}</td>
              <td>{{ member.forename }}</td>
              <td>{{ member.surname }}</td>
              <td>{{ member.email }}</td>
            </tr>
        }
      </tbody>
    </table>
    }
</div>
