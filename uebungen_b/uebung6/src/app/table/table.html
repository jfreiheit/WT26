
@if(members().length == 0) {
  <h3>Keine Einträge vorhanden</h3>
}
@else {
  <h3>Alle Teilnehmerinnen</h3>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nr</th>
        <th>Vorname</th>
        <th>Nachname</th>
        <th>E-Mail</th>
      </tr>
    </thead>
    <tbody>
      @for(member of members(); track $index) {
        <tr>
          <td>{{$index + 1}}</td>
        </tr>
      }
    </tbody>
  </table>
}
