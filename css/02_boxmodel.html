		<!DOCTYPE html>
		<html lang="en">
		<head>
		    <meta charset="UTF-8">
		    <meta http-equiv="X-UA-Compatible" content="IE=edge">
		    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		    <title>Box-Model</title>
		    <style>
		      * {
		        box-sizing: content-box;  /* Standard */
		      }

		      img {
						width: 348px;
		        border: 1px solid black;
						margin: 40px;
		    }
		      div {
		          width: 280px;
		          padding: 30px;
							padding-top: 50px;
		          border: 5px solid gray;
		          margin: 0;
		      }

					h1 {
						border: 2px solid red;
						padding: 2em;
						margin: 50px;
						width: 100px;
					}
		    </style>
		</head>
		<body>
		    <header>
		        <h1>Box-Model</h1>
		    </header>
		    <main>
		        <img src="../images/fiw.jpg" alt="fiw logo" />
		        <div>
							Das FIW-Logo hat eine Breite von 350px (width:348px + 2 x 1px Border).
							Der Inhalt dieser Box hat eine Breite von 280px.
							Dazu kommt padding von 30px (auf beiden Seiten)
							und ein Rahmen mit der Breite von 5px. Macht zusammen
							350px.
		        </div>
		    </main>
		    <footer>
		        <p><a href="./01_cascading.html">Einführung</a>&nbsp;&middot;&nbsp;<a href="./03_rangfolge.html">Rangfolge</a></p>
		    </footer>

		</body>
		</html>
